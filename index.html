<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Popup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .contact-popup {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
      display: none;
      width: fit-content;
      max-width: calc(100vw - 40px);
      background: #ffffff;
      color: #111111;
      border: 1px solid #d9d9d9;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      padding: 16px 18px;
    }

    .contact-popup.show {
      display: block;
      animation: slideUp 0.25s ease-out;
    }

    .contact-popup h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .contact-popup .text {
      white-space: pre-line;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .contact-popup button {
      background: #0b74de;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .contact-popup button:hover {
      background: #095db0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .contact-popup {
        right: 12px;
        left: 12px;
        bottom: 12px;
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <div id="contactPopup" class="contact-popup">
    <h3>📞 Зв'яжіться з нами</h3>
    <div class="text">
Телефони:
+380 50 470 26 85
+380 98 789 62 29

Telegram / Viber / WhatsApp:
+380 50 470 26 85
+380 98 789 62 29

Будемо раді відповісти на ваші запитання та допомогти!
    </div>
    <button id="closePopup">Закрить</button>
  </div>

  <script>
    const popup = document.getElementById('contactPopup');
    const closeBtn = document.getElementById('closePopup');

    window.addEventListener('load', () => {
      setTimeout(() => {
        popup.classList.add('show');
      }, 1000);
    });

    closeBtn.addEventListener('click', () => {
      popup.classList.remove('show');
    });
  </script>

</body>
</html>
