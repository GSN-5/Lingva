<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .contact-popup {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display: none;
      width: max-content;
      max-width: calc(100vw - 32px);
      height: auto;
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.14);
      padding: 10px 12px;
      box-sizing: border-box;
    }

    .contact-popup.show {
      display: inline-block;
    }

    .contact-popup h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      line-height: 1.3;
    }

    .contact-popup .text {
      display: inline-block;
      width: auto;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.45;
      margin: 0 0 10px 0;
    }

    .contact-popup button {
      display: inline-block;
      width: auto;
      background: #0b74de;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .contact-popup {
        right: 10px;
        left: 10px;
        bottom: 10px;
        max-width: none;
        width: auto;
      }
    }
  </style>
</head>
<body>

  <div id="contactPopup" class="contact-popup">
    <h3>📞 Зв'яжіться з нами</h3>
    <div class="text">
Телефони:
+380 50 470 26 85
+380 98 789 62 29

Telegram / Viber / WhatsApp:
+380 50 470 26 85
+380 98 789 62 29

Будемо раді відповісти на ваші запитання та допомогти!
    </div>
    <br />
    <button id="closePopup">Закрить</button>
  </div>

  <script>
    const popup = document.getElementById('contactPopup');
    const closeBtn = document.getElementById('closePopup');

    window.addEventListener('load', () => {
      setTimeout(() => popup.classList.add('show'), 800);
    });

    closeBtn.addEventListener('click', () => {
      popup.classList.remove('show');
    });
  </script>

</body>
</html>
